services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tankada}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tankada}
      POSTGRES_DB: ${POSTGRES_DB:-tankada}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tankada"]
      interval: 5s
      timeout: 5s
      retries: 5

  analyzer:
    build:
      context: ../analyzer
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

  opa:
    image: openpolicyagent/opa:1.16.1
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "/policies"
    volumes:
      - ../policies:/policies:ro

  proxy:
    build:
      context: ../proxy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-tankada}:${POSTGRES_PASSWORD:-tankada}@postgres:5432/${POSTGRES_DB:-tankada}?sslmode=disable
      PORT: "8082"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build:
      context: ../gateway
    environment:
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      TANKADA_ENV: ${TANKADA_ENV:-development}
      ANALYZER_URL: "http://analyzer:8001"
      OPA_URL: "http://opa:8181"
      PROXY_URL: "http://proxy:8082"
    ports:
      - "8080:8080"
    depends_on:
      analyzer:
        condition: service_healthy
      opa:
        condition: service_started
      proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
