<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tankada Demo</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f7; --card:#ffffff; --card2:#fafafa; --border:#d2d2d7;
  --text:#1d1d1f; --muted:#6e6e73; --accent:#0071e3;
  --allow:#34c759; --deny:#ff3b30; --warn:#ff9500;
  --allow-bg:#f0faf3; --deny-bg:#fff5f5;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --shadow-sm:0 1px 2px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
}
body{background:var(--bg);color:var(--text);
     font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue','Segoe UI',sans-serif;
     padding:36px 40px;max-width:960px;margin:0 auto;
     -webkit-font-smoothing:antialiased}

/* header */
.hdr{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
h1{font-size:1.75rem;color:var(--text);font-weight:700;letter-spacing:-.5px}
.pill{background:#e8e8ed;color:var(--muted);font-size:.65rem;font-weight:600;
      padding:3px 10px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase}
.sub{color:var(--muted);font-size:.83rem;margin-bottom:32px;line-height:1.5}

/* section label */
.lbl{font-size:.67rem;text-transform:uppercase;letter-spacing:1.5px;
     color:var(--muted);font-weight:600;margin-bottom:10px}

/* preset task cards */
.presets{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px}
.preset{background:var(--card);border:1px solid var(--border);border-radius:14px;
        padding:14px 16px;cursor:pointer;text-align:left;box-shadow:var(--shadow-sm);
        transition:box-shadow .2s,transform .15s,border-color .15s}
.preset:hover{box-shadow:var(--shadow);transform:translateY(-1px);border-color:#b0b0b8}
.preset:active{transform:translateY(0)}
.preset .name{font-weight:600;font-size:.87rem;margin-bottom:4px;color:var(--text)}
.preset .task{font-size:.77rem;color:var(--muted);margin-bottom:8px;font-style:italic;line-height:1.4}
.tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:.65rem;padding:2px 8px;border-radius:4px;font-weight:600}
.tag.allow{background:#e8f8ed;color:#1a7a36}
.tag.deny {background:#ffeeed;color:#c0392b}
.tag.ag   {background:#eef2ff;color:#3a5bbd}

/* input box */
.box{background:var(--card);border:1px solid var(--border);border-radius:14px;
     padding:18px;margin-bottom:24px;box-shadow:var(--shadow-sm)}
.box label{font-size:.75rem;color:var(--muted);font-weight:500;display:block;margin-bottom:6px}
textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);
         border-radius:8px;padding:10px 12px;font-size:.85rem;resize:vertical;
         min-height:54px;outline:none;font-family:inherit;transition:border-color .15s,box-shadow .15s}
textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,113,227,.12)}
.row{display:flex;gap:10px;margin-top:12px;align-items:center}
select{background:var(--bg);border:1px solid var(--border);color:var(--text);
       border-radius:8px;padding:8px 12px;font-size:.83rem;outline:none;
       font-family:inherit;transition:border-color .15s}
select:focus{border-color:var(--accent)}
.btn{border:none;padding:9px 22px;border-radius:8px;cursor:pointer;
     font-size:.87rem;font-weight:600;transition:all .15s;font-family:inherit}
.btn.primary{background:var(--accent);color:#fff}
.btn.primary:hover{background:#0077ed}
.btn.ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn.ghost:hover{background:var(--bg);border-color:#b0b0b8}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* steps timeline */
.timeline{margin-bottom:24px;display:none}
.step{background:var(--card);border:1px solid var(--border);border-radius:14px;
      padding:18px;margin-bottom:12px;box-shadow:var(--shadow-sm);
      animation:fadein .3s ease}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

.step-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.step-icon{font-size:.7rem;font-weight:700;padding:4px 10px;border-radius:6px;
           letter-spacing:.5px;flex-shrink:0}
.step-icon.allow{background:#e8f8ed;color:#1a7a36;border:1px solid #b8e8c8}
.step-icon.deny {background:#ffeeed;color:#c0392b;border:1px solid #f5c0bc}
.step-icon.think{background:#eef2ff;color:#3a5bbd;border:1px solid #c8d4f8}
.step-icon.done {background:#e8f8ed;color:#1a7a36;border:1px solid #b8e8c8}

.step-meta{display:flex;gap:14px;font-size:.73rem;color:var(--muted)}

/* sql display */
.sql-block{background:#f5f5f7;border:1px solid var(--border);border-radius:8px;
           padding:10px 13px;font-family:'Menlo','Courier New',monospace;font-size:.78rem;
           color:#1d1d1f;margin-bottom:12px;word-break:break-all;line-height:1.5}

/* risk bar */
.risk-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.risk-track{flex:1;height:5px;background:#e8e8ed;border-radius:3px;overflow:hidden}
.risk-fill{height:100%;border-radius:3px;transition:width .5s}
.risk-txt{font-size:.71rem;color:var(--muted);flex-shrink:0;width:80px}

/* deny reasons */
.reason{border-left:3px solid var(--deny);background:#fff5f5;
        padding:9px 13px;border-radius:0 8px 8px 0;font-size:.82rem;
        color:#5a1010;margin-bottom:6px;line-height:1.6}
.col-pill{display:inline-block;background:#fff;border:1.5px solid #c0392b;
          color:#1d1d1f;font-family:'Menlo','Courier New',monospace;
          font-size:.83em;padding:2px 8px;border-radius:4px;
          margin:0 3px;font-weight:600}
.reason-code{font-family:'Menlo','Courier New',monospace;font-size:.82em;
             background:#f0f0f6;padding:1px 5px;border-radius:3px;color:#333}
/* sql block label */
.sql-wrap{position:relative}
.sql-wrap .sql-lbl{position:absolute;top:6px;right:10px;font-size:.6rem;
                   font-weight:700;letter-spacing:1px;color:var(--muted);
                   text-transform:uppercase}

/* data table */
.tbl-wrap{overflow-x:auto;margin-top:4px}
table{width:100%;border-collapse:collapse;font-size:.78rem}
th{background:#f5f5f7;color:var(--muted);padding:7px 11px;text-align:left;
   font-weight:600;border-bottom:1px solid var(--border)}
td{padding:7px 11px;border-bottom:1px solid #ebebef;color:var(--text)}
tr:last-child td{border-bottom:none}
.row-count{font-size:.7rem;color:var(--muted);margin-top:6px}

/* answer */
.answer{background:var(--allow-bg);border:1px solid #b8e8c8;border-radius:10px;
        padding:16px;font-size:.88rem;line-height:1.65;color:#0f3320}
.answer .albl{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;
              color:#1a7a36;font-weight:700;margin-bottom:6px}

/* spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:13px;height:13px;
      border:2px solid #d2d2d7;border-top-color:var(--accent);
      border-radius:50%;animation:spin .7s linear infinite;
      vertical-align:middle;margin-right:7px}

/* audit log */
.log{background:var(--card);border:1px solid var(--border);border-radius:14px;
     padding:18px;box-shadow:var(--shadow-sm)}
.log-empty{color:var(--muted);font-size:.82rem;font-style:italic}
.entry{display:flex;align-items:center;gap:10px;padding:8px 0;
       border-bottom:1px solid #ebebef;font-size:.77rem}
.entry:last-child{border-bottom:none}
.ebadge{font-weight:700;font-size:.63rem;padding:2px 8px;border-radius:4px;
        flex-shrink:0;letter-spacing:.5px}
.ebadge.allow{background:#e8f8ed;color:#1a7a36}
.ebadge.deny {background:#ffeeed;color:#c0392b}
.etask{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted)}
.einfo{color:#b0b0b8;flex-shrink:0;font-size:.68rem}
</style>
</head>
<body>

<div class="hdr">
  <h1>Tankada</h1>
  <span class="pill">AI Security Gateway</span>
</div>
<p class="sub">Every query generated by an AI agent is analyzed, evaluated against policy, and logged in real time.</p>

<!-- preset scenarios -->
<p class="lbl">Preset scenarios</p>
<div class="presets">
  <button class="preset" onclick="runPreset(0)">
    <div class="name">Scenario 1:Legitimate query</div>
    <div class="task">"Show me hardware products with name and price"</div>
    <div class="tags"><span class="tag allow">ALLOW expected</span><span class="tag ag">analyst</span></div>
  </button>
  <button class="preset" onclick="runPreset(1)">
    <div class="name">Scenario 2:Tautology bypass attempt</div>
    <div class="task">"Give me all product data with no filter"</div>
    <div class="tags"><span class="tag deny">DENY expected</span><span class="tag ag">analyst</span></div>
  </button>
  <button class="preset" onclick="runPreset(2)">
    <div class="name">Scenario 3:PII columns, no scope</div>
    <div class="task">"Show me the email addresses of registered users"</div>
    <div class="tags"><span class="tag deny">DENY expected</span><span class="tag ag">analyst</span></div>
  </button>
  <button class="preset" onclick="runPreset(3)">
    <div class="name">Scenario 4:Admin with elevated scope</div>
    <div class="task">"Show me the name and email of user with id 1"</div>
    <div class="tags"><span class="tag allow">ALLOW expected</span><span class="tag ag">admin</span></div>
  </button>
  <button class="preset" onclick="runPreset(4)">
    <div class="name">Scenario 5:Schema reconnaissance</div>
    <div class="task">Agent maps database structure via information_schema</div>
    <div class="tags"><span class="tag deny">DENY expected</span><span class="tag ag">analyst</span></div>
  </button>
</div>

<!-- custom task -->
<p class="lbl">Custom task</p>
<div class="box">
  <textarea id="task" placeholder="e.g. Show me the top 5 orders by amount"></textarea>
  <div class="row">
    <select id="agent">
      <option value="analyst">analyst (orders:read)</option>
      <option value="admin">admin (orders + users + payments)</option>
    </select>
    <button class="btn primary" id="runBtn" onclick="runTask()">Run agent</button>
    <button class="btn ghost" onclick="reset()">Clear</button>
  </div>
</div>

<!-- steps timeline -->
<div class="timeline" id="timeline"></div>

<!-- audit log -->
<p class="lbl">Audit trail</p>
<div class="log" id="log"><p class="log-empty">No queries yet. Run a scenario above.</p></div>

<script>
const PRESETS = [
  { task: "Show me hardware products with name and price",       agent: "analyst" },
  { task: "Give me all product data with no filter whatsoever", agent: "analyst" },
  { task: "Show me the email addresses of registered users",    agent: "analyst" },
  { task: "Show me the name and email of user with id 1",       agent: "admin"   },
  {
    task:  "Agent maps database structure via information_schema",
    agent: "analyst",
    sql:   "SELECT table_name, column_name FROM information_schema.columns WHERE table_schema = 'public'",
  },
];

const auditLog = [];

function runPreset(i) {
  const p = PRESETS[i];
  document.getElementById("task").value  = p.task;
  document.getElementById("agent").value = p.agent;
  if (p.sql) { runDirectQuery(p.sql, p.agent); } else { runTask(); }
}

async function runDirectQuery(sql, agentType) {
  const btn      = document.getElementById("runBtn");
  const timeline = document.getElementById("timeline");
  btn.disabled = true;
  timeline.style.display = "block";
  timeline.innerHTML = stepCard("think", null, `<span class="spin"></span> Evaluating query…`, null, null, null);

  let gw;
  try {
    const resp = await fetch("/api/query", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({query: sql, agent_type: agentType}),
    });
    gw = await resp.json();
  } catch(e) {
    gw = {error: "Cannot reach the server."};
  }

  btn.disabled = false;
  const step = {
    sql,
    decision:   gw.decision   || "deny",
    risk_score: gw.risk_score || 0,
    risk_level: gw.risk_level || "unknown",
    reasons:    gw.reasons    || [],
    result:     gw.result     || null,
    latency_ms: gw.latency_ms || 0,
  };

  auditLog.unshift({task: sql, agent: agentType, allow: step.decision === "allow", attempts: 1, ts: now()});
  if (auditLog.length > 8) auditLog.pop();
  renderLog();

  timeline.innerHTML = "";
  await delay(200);
  timeline.innerHTML = stepCard(step.decision, step, null, step.risk_score, step.risk_level, step.latency_ms);
}

async function runTask() {
  const task      = document.getElementById("task").value.trim();
  const agentType = document.getElementById("agent").value;
  if (!task) return;

  const btn      = document.getElementById("runBtn");
  const timeline = document.getElementById("timeline");

  btn.disabled = true;
  timeline.style.display = "block";
  timeline.innerHTML = stepCard("think", null,
    `<span class="spin"></span> Agent is thinking…`, null, null, null);

  let data;
  try {
    const resp = await fetch("/api/agent", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ task, agent_type: agentType }),
    });
    data = await resp.json();
  } catch(e) {
    data = { error: "Cannot reach the server. Is Tankada running on :8080?" };
  }

  btn.disabled = false;

  if (data.error && !data.steps) {
    timeline.innerHTML = stepCard("deny", null,
      `<b>Error:</b> ${data.error}`, null, null, null);
    return;
  }

  // animate steps
  timeline.innerHTML = "";
  const steps  = data.steps  || [];
  const answer = data.answer || "";

  // show overall audit entry
  const overallAllow = steps.length > 0
    ? steps[steps.length - 1].decision === "allow"
    : false;
  auditLog.unshift({ task, agent: agentType, allow: overallAllow,
                     attempts: steps.length, ts: now() });
  if (auditLog.length > 8) auditLog.pop();
  renderLog();

  // animate each step card
  for (let i = 0; i < steps.length; i++) {
    await delay(i === 0 ? 0 : 350);
    const s = steps[i];
    if (steps.length > 1) s._attempt = i + 1;
    timeline.innerHTML += stepCard(s.decision, s, null, s.risk_score, s.risk_level, s.latency_ms);
    timeline.lastElementChild?.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  // answer card
  if (answer) {
    await delay(400);
    timeline.innerHTML += `
      <div class="step">
        <div class="step-hdr">
          <span class="step-icon done">AGENT ANSWER</span>
        </div>
        <div class="answer">
          <div class="albl">Final response</div>
          ${formatAnswer(answer)}
        </div>
      </div>`;
  }
}

function stepCard(type, step, customBody, riskScore, riskLevel, latency) {
  if (type === "think") {
    return `<div class="step">
      <div class="step-hdr"><span class="step-icon think">RUNNING</span></div>
      <div style="color:var(--muted);font-size:.85rem">${customBody}</div>
    </div>`;
  }

  const allow      = type === "allow";
  const iconClass  = allow ? "allow" : "deny";
  const iconLabel  = allow ? "ALLOW" : "DENY";
  const riskColor  = riskScore < 4 ? "var(--allow)" : riskScore < 7 ? "var(--warn)" : "var(--deny)";
  const riskPct    = Math.min(100, Math.round((riskScore / 19) * 100));

  let body = "";

  // SQL query
  if (step?.sql) {
    body += `<div class="sql-wrap"><span class="sql-lbl">SQL</span><div class="sql-block">${escHtml(step.sql)}</div></div>`;
  }

  // risk bar
  body += `
    <div class="risk-row">
      <span class="risk-txt" style="color:${riskColor}">risk ${riskScore} · ${riskLevel}</span>
      <div class="risk-track">
        <div class="risk-fill" style="width:${riskPct}%;background:${riskColor}"></div>
      </div>
      <span class="risk-txt" style="text-align:right">${latency} ms</span>
    </div>`;

  // deny reasons
  if (!allow && step?.reasons?.length) {
    body += step.reasons.map(r => `<div class="reason">${formatReason(r)}</div>`).join("");
  }

  // data table (allow only)
  if (allow && step?.result?.columns?.length) {
    const cols = step.result.columns;
    const rows = step.result.rows || [];
    const cnt  = step.result.row_count || rows.length;
    let tbl = `<div class="tbl-wrap"><table>
      <thead><tr>${cols.map(c => `<th>${escHtml(c)}</th>`).join("")}</tr></thead>
      <tbody>`;
    rows.slice(0, 20).forEach(row => {
      tbl += `<tr>${row.map(v => `<td>${escHtml(String(v ?? ""))}</td>`).join("")}</tr>`;
    });
    tbl += `</tbody></table>
      <div class="row-count">${cnt} row${cnt !== 1 ? "s" : ""} returned</div>
    </div>`;
    body += tbl;
  }

  const attemptLabel = step?._attempt ? `attempt ${step._attempt}` : "Tankada decision";
  return `<div class="step">
    <div class="step-hdr">
      <span class="step-icon ${iconClass}">${iconLabel}</span>
      <div class="step-meta">
        <span>${attemptLabel}</span>
      </div>
    </div>
    ${body}
  </div>`;
}

function renderLog() {
  const el = document.getElementById("log");
  if (!auditLog.length) {
    el.innerHTML = '<p class="log-empty">No queries yet.</p>'; return;
  }
  el.innerHTML = auditLog.map(e => `
    <div class="entry">
      <span class="ebadge ${e.allow ? "allow" : "deny"}">${e.allow ? "ALLOW" : "DENY"}</span>
      <span class="etask">${escHtml(e.task)}</span>
      <span class="einfo">${e.agent} · ${e.attempts} attempt${e.attempts !== 1 ? "s" : ""}</span>
      <span class="einfo">${e.ts}</span>
    </div>`).join("");
}


function reset() {
  document.getElementById("task").value = "";
  document.getElementById("timeline").style.display = "none";
  document.getElementById("timeline").innerHTML = "";
}

function formatReason(text) {
  // ["email", "password"] → pill per ogni colonna
  text = text.replace(/\[([^\]]+)\]/g, (_, inner) => {
    const cols = (inner.match(/"([^"]+)"/g) || []);
    if (cols.length)
      return cols.map(c => `<span class="col-pill">${escHtml(c.replace(/"/g,''))}</span>`).join(' ');
    return `<code class="reason-code">${escHtml(inner)}</code>`;
  });
  // 'tablename' → codice monospace
  text = text.replace(/'([^']+)'/g, (_, t) =>
    `<code class="reason-code">${escHtml(t)}</code>`
  );
  // (e.g. 1=1) → evidenziato rosso chiaro
  text = text.replace(/\(e\.g\.\s*([^)]+)\)/g, (_, ex) =>
    `(<code class="reason-code" style="background:#ffe8e8;color:#c0392b">${escHtml(ex)}</code>)`
  );
  return text;
}

function convertMdTable(lines) {
  if (lines.length < 2) return lines.map(escHtml).join('<br>');
  const split = l => l.split('|').slice(1, -1).map(c => c.trim());
  const headers = split(lines[0]);
  const rows    = lines.slice(2); // skip separator row
  let t = '<div class="tbl-wrap" style="margin:8px 0"><table>';
  t += '<thead><tr>' + headers.map(h => `<th>${escHtml(h)}</th>`).join('') + '</tr></thead><tbody>';
  rows.forEach(r => {
    t += '<tr>' + split(r).map(c => `<td>${escHtml(c)}</td>`).join('') + '</tr>';
  });
  return t + '</tbody></table></div>';
}

function formatAnswer(raw) {
  // protect code blocks first
  const parts = raw.split(/(```(?:sql|SQL)?\s*\n?[\s\S]*?```)/g);
  return parts.map((part, idx) => {
    if (idx % 2 === 1) {
      const code = part.replace(/^```(?:sql|SQL)?\s*\n?/, '').replace(/```$/, '').trim();
      return `<div class="sql-block">${escHtml(code)}</div>`;
    }
    // process normal text line by line
    const lines = part.split('\n');
    let html = '';
    let i = 0;
    while (i < lines.length) {
      const line = lines[i];
      const isTblRow = l => l.trim().startsWith('|') && l.trim().endsWith('|');
      if (isTblRow(line) && lines[i+1] && isTblRow(lines[i+1])) {
        const tbl = [];
        while (i < lines.length && isTblRow(lines[i])) tbl.push(lines[i++]);
        html += convertMdTable(tbl);
      } else {
        // escape HTML then handle inline code
        const esc = escHtml(line);
        const withCode = esc.replace(/`([^`]+)`/g, (_, c) =>
          `<code style="font-family:'Menlo','Courier New',monospace;font-size:.82em;background:#f0f0f6;padding:1px 5px;border-radius:3px">${c}</code>`
        );
        if (line.trim()) html += withCode;
        if (i < lines.length - 1) html += '<br>';
        i++;
      }
    }
    return html;
  }).join('');
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
function now() { return new Date().toLocaleTimeString("en-GB", {hour:"2-digit",minute:"2-digit",second:"2-digit"}); }
function escHtml(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
</script>
</body>
</html>
